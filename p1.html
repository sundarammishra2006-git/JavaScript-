<html>

    <title>Alert Example</title>
    <script>
      function showAlert() {
        alert("Bhagggg !");
      }
      var name = "Sundaram";
      let age = 30;
      const country = "USA";
      
      console.log(name);
      console.log(age);

  </head>
  <body>

  </body>
</html>
